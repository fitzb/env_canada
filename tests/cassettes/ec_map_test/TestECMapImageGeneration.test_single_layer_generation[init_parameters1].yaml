        \ <Name>WMS</Name>\n  <Title>MSC GeoMet \u2014 GeoMet-Weather 2.38.1</Title>\n
        \ <Abstract>GeoMet-Weather provides public access to the Meteorological Service
        of Canada (MSC) and Environment and Climate Change Canada (ECCC) data via
        interoperable web services and application programming interfaces (API). Through
        open standards, users can freely and quickly access thousands of real-time
        and archived weather, climate and water datasets and products and integrate
        them in their domain-specific applications and decision support systems. Users
        can build mobile apps, create interactive web maps, and display and animate
        MSC data in desktop software. MSC GeoMet also enables on demand raw data clipping
        and reprojection, on demand format conversion and custom visualization.</Abstract>\n
