        cascaded=\"0\">\n        <Name>RADAR_1KM_RRAI</Name>\n        <Title>Radar
        precipitation rate for rain [mm/h]</Title>\n        <Abstract>This mosaic
        is calculated over the North American domain with a horizontal spatial resolution
        of 1 km. This mosaic therefore includes all the Canadian and American radars
        available in the network and which can reach a maximum of 180 contributing
        radars. To better represent precipitation over the different seasons, this
        mosaic renders in mm/h to represent rain and in cm/h to represent snow. For
        the two precipitation types (rain and snow), we use two different mathematical
        relationships to convert the reflectivity by rainfall rates (mm/h rain cm/h
        for snow). This mosaic is based on the DPQPE (Dual-Pol Quantitative Precipitation
        Estimation) product for S-Band radars. For the US Nexrad radars, ECCC uses
        the most similar product from the US Meteorological Service (NOAA). This product
        displays radar reflectivity converted into precipitation rates, using the
        same formulas as the Canadian radars.</Abstract>\n        <KeywordList>\n
